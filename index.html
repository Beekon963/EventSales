<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件一覧 | SALES EVENT PORTAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a1a;
    --muted: #9a9a9a;
    --accent: #c0191a;
    --docomo: #e53935;
    --au: #f57c00;
    --softbank: #1565c0;
    --uq: #2e7d32;
    --ymobile: #7b1fa2;
    --green: #06C755;
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family:'Noto Sans JP',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
  }
  .header {
    position:sticky; top:0; z-index:100;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:14px 16px 10px;
  }
  .header-top {
    display:flex; align-items:center; gap:10px; margin-bottom:12px;
  }
  .logo-mark {
    width:36px; height:36px; border-radius:10px;
    background:var(--accent); display:flex; align-items:center;
    justify-content:center; font-size:18px; flex-shrink:0;
    box-shadow:0 4px 12px rgba(192,25,26,0.25);
  }
  .header-title { font-size:16px; font-weight:900; letter-spacing:-.01em; }
  .header-sub { font-size:10px; color:var(--muted); letter-spacing:.08em; }
  .job-count-badge {
    margin-left:auto; background:rgba(192,25,26,.1); color:var(--accent);
    font-size:11px; font-weight:700; padding:3px 10px; border-radius:100px;
  }
  .job-list {
    padding:16px 16px 100px; max-width:600px; margin:0 auto;
  }
  .job-card {
    background:var(--surface); border-radius:var(--radius);
    margin-bottom:12px; overflow:hidden;
    border:1px solid var(--border);
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    cursor:pointer; transition:all .2s;
    animation:fadeUp .35s ease both;
  }
  .job-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.1); }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .job-card:nth-child(1) { animation-delay:.04s; }
  .job-card:nth-child(2) { animation-delay:.08s; }
  .job-card:nth-child(3) { animation-delay:.12s; }
  .job-card:nth-child(4) { animation-delay:.16s; }
  .carrier-bar { height:4px; }
  .job-body { padding:16px; }
  .job-meta { display:flex; align-items:center; gap:6px; margin-bottom:10px; }
  .carrier-tag {
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 8px; border-radius:6px;
    font-size:11px; font-weight:700;
    background:rgba(0,0,0,.05);
  }
  .job-station { font-size:20px; font-weight:900; margin-bottom:3px; }
  .job-store { font-size:12px; color:var(--muted); margin-bottom:12px; }
  .job-price-wrap {
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(135deg, rgba(192,25,26,.08), rgba(192,25,26,.04));
    border:1.5px solid rgba(192,25,26,.15);
    border-radius:12px;
    padding:10px 14px;
    margin:10px 0 8px;
  }
  .job-price-left { display:flex; align-items:baseline; gap:4px; }
  .job-price {
    font-family:'Space Mono',monospace;
    font-size:32px; font-weight:700;
    color:var(--accent); line-height:1;
  }
  .job-price-unit { font-size:13px; color:var(--muted); font-weight:600; }
  .job-price-label { font-size:10px; color:var(--muted); font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
  .job-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:8px; }
  .job-item span { font-size:10px; color:var(--muted); display:block; margin-bottom:2px; }
  .job-item .val { font-size:13px; font-weight:500; }
  .transport-badge {
    display:inline-flex; gap:6px; flex-wrap:wrap;
  }
  .transport-tag {
    font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px;
    background:rgba(0,0,0,.05); color:var(--muted);
  }
  .transport-tag.lodging {
    background:rgba(192,25,26,.08); color:var(--accent);
  }
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.5); backdrop-filter:blur(8px);
    z-index:200; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal-sheet {
    background:#fff; border-radius:24px 24px 0 0;
    padding:24px 20px 40px; width:100%; max-width:600px;
    animation:slideUp .25s ease;
    max-height:90vh; overflow-y:auto;
  }
  @keyframes slideUp {
    from { transform:translateY(100%); }
    to   { transform:translateY(0); }
  }
  .modal-handle {
    width:40px; height:4px; border-radius:4px;
    background:var(--border); margin:0 auto 20px;
  }
  .modal-carrier-bar { height:3px; border-radius:3px; margin-bottom:16px; }
  .modal-station { font-size:24px; font-weight:900; margin-bottom:4px; }
  .modal-store { font-size:13px; color:var(--muted); margin-bottom:16px; }
  .modal-price {
    font-family:'Space Mono',monospace;
    font-size:42px; font-weight:700; color:var(--accent);
    margin-bottom:4px; line-height:1.1;
  }
  .modal-price span { font-size:14px; color:var(--muted); font-weight:400; font-family:'Noto Sans JP',sans-serif; }
  .modal-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0;
  }
  .modal-item label { font-size:11px; color:var(--muted); display:block; margin-bottom:3px; }
  .modal-item .val { font-size:14px; font-weight:500; }
  .btn-line {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:16px; border-radius:14px;
    background:var(--green); color:#fff;
    font-family:inherit; font-size:16px; font-weight:900;
    border:none; cursor:pointer; transition:all .2s;
    text-decoration:none; letter-spacing:.02em;
    box-shadow:0 4px 16px rgba(6,199,85,.3);
  }
  .btn-line:hover { background:#04a844; transform:translateY(-1px); }
  .btn-close {
    display:flex; align-items:center; justify-content:center;
    width:100%; padding:13px; border-radius:12px;
    background:var(--bg); color:var(--muted);
    font-family:inherit; font-size:14px; font-weight:700;
    border:none; cursor:pointer; margin-top:10px;
  }
  .footer {
    position:fixed; bottom:0; left:0; right:0;
    background:rgba(255,255,255,0.96); backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    padding:10px 16px 16px; text-align:center;
    box-shadow:0 -2px 12px rgba(0,0,0,0.06);
  }
  .footer p { font-size:11px; color:var(--muted); margin-bottom:8px; }
  .btn-line-footer {
    display:inline-flex; align-items:center; gap:8px;
    padding:12px 28px; border-radius:100px;
    background:var(--green); color:#fff;
    font-family:inherit; font-size:14px; font-weight:900;
    border:none; cursor:pointer; text-decoration:none;
    box-shadow:0 4px 16px rgba(6,199,85,.3);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-mark">📋</div>
    <div>
      <div class="header-title">SALES EVENT PORTAL</div>
      <div class="header-sub">案件一覧</div>
    </div>
    <div class="job-count-badge" id="count-badge">募集中 4件</div>
  </div>
</div>

<div class="job-list" id="job-list"></div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-carrier-bar" id="modal-bar"></div>
    <div class="modal-station" id="modal-station"></div>
    <div class="modal-store" id="modal-store"></div>
    <div id="modal-tags" style="margin-bottom:16px;"></div>
    <div class="modal-price" id="modal-price"></div>
    <div class="modal-grid" id="modal-grid"></div>
    <a class="btn-line" id="modal-line-btn" href="#" target="_blank">
      <svg width="22" height="22" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="white"/><path d="M24 8C15.16 8 8 14.26 8 22c0 5.4 3.4 10.14 8.5 12.82-.36 1.34-1.28 4.86-1.46 5.6-.22.88.32.88.68.64.28-.18 4.38-2.98 6.16-4.18.68.1 1.38.14 2.12.14 8.84 0 16-6.26 16-14S32.84 8 24 8z" fill="#06C755"/></svg>
      出勤を希望する 🟢
    </a>
    <button class="btn-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

<div class="footer">
  <p>気になる案件はLINEでお気軽にお問い合わせください</p>
  <a class="btn-line-footer" href="https://line.me/R/ti/p/@597ckygq" target="_blank">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="10" fill="white"/><path d="M24 8C15.16 8 8 14.26 8 22c0 5.4 3.4 10.14 8.5 12.82-.36 1.34-1.28 4.86-1.46 5.6-.22.88.32.88.68.64.28-.18 4.38-2.98 6.16-4.18.68.1 1.38.14 2.12.14 8.84 0 16-6.26 16-14S32.84 8 24 8z" fill="#06C755"/></svg>
    公式LINEに問い合わせる
  </a>
</div>

<script>
const LINE_ID = '@597ckygq';

const CARRIER = {
  docomo: { color:'#e53935', emoji:'🍄', label:'docomo' },
  other:  { color:'#455a64', emoji:'🏢', label:'その他' }
};

const JOBS = [
  {
    id: 101,
    carrier: 'other',
    station: '新潟錦町',
    store: 'ヤマダデンキ新潟錦町',
    price: 26000,
    dates: '5/9(金)〜5/10(土)',
    transport: '交通費別途支給',
    lodging: '宿泊費支給あり',
    position: 'ラウンダー',
    count: 2,
    tag: '出張',
    note: '出張・宿泊あり'
  },
  {
    id: 102,
    carrier: 'other',
    station: '羽生（イオンモール）',
    store: '上新電機 羽生イオンモール店',
    price: 26000,
    dates: '5/9(金)〜5/10(土)',
    transport: '交通費別途支給',
    lodging: '宿泊費支給あり',
    position: 'ラウンダー',
    count: 1,
    tag: '出張',
    note: '出張・宿泊あり'
  },
  {
    id: 103,
    carrier: 'other',
    station: '前橋吉岡',
    store: 'ヤマダデンキ TLS前橋吉岡店',
    price: 26000,
    dates: '5/16(金)〜5/17(土)',
    transport: '交通費別途支給',
    lodging: '宿泊費支給あり',
    position: 'ラウンダー',
    count: 1,
    tag: '増員・出張',
    note: '増員案件・出張・宿泊あり'
  },
  {
    id: 104,
    carrier: 'other',
    station: '小山',
    store: 'ケーズデンキ小山',
    price: 26000,
    dates: '5/16(金)〜5/17(土)',
    transport: '交通費別途支給',
    lodging: '宿泊費支給あり',
    position: 'ラウンダー',
    count: 1,
    tag: '出張',
    note: '出張・宿泊あり'
  }
];

function renderJobs() {
  const list = document.getElementById('job-list');
  list.innerHTML = JOBS.map((j, i) => {
    const c = CARRIER[j.carrier] || { color:'#888', emoji:'📋', label:j.carrier };
    return `
      <div class="job-card" style="animation-delay:${i * 0.06}s" onclick="openModal(${j.id})">
        <div class="carrier-bar" style="background:${c.color};"></div>
        <div class="job-body">
          <div class="job-meta">
            <span class="carrier-tag" style="color:${c.color};">${c.emoji} ${c.label}</span>
            ${j.tag ? `<span style="background:rgba(192,25,26,.1);color:var(--accent);font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;">★ ${j.tag}</span>` : ''}
          </div>
          <div class="job-station">${j.station}</div>
          <div class="job-store">${j.store}</div>
          <div class="job-price-wrap">
            <div class="job-price-left">
              <span class="job-price">¥${j.price.toLocaleString()}</span>
              <span class="job-price-unit">/日</span>
            </div>
            <span class="job-price-label">単価</span>
          </div>
          <div class="job-row">
            <div class="job-item"><span>日程</span><div class="val">${j.dates}</div></div>
            <div class="job-item"><span>募集</span><div class="val">${j.position} ${j.count}名</div></div>
          </div>
          <div class="transport-badge">
            <span class="transport-tag">🚃 ${j.transport}</span>
            ${j.lodging ? `<span class="transport-tag lodging">🏨 ${j.lodging}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function openModal(id) {
  const j = JOBS.find(j => j.id === id);
  if (!j) return;
  const c = CARRIER[j.carrier] || { color:'#888', emoji:'📋', label:j.carrier };

  document.getElementById('modal-bar').style.background = c.color;
  document.getElementById('modal-station').textContent = j.station;
  document.getElementById('modal-store').textContent = j.store;
  document.getElementById('modal-tags').innerHTML =
    `<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;background:rgba(0,0,0,.05);font-size:12px;font-weight:700;color:${c.color};">${c.emoji} ${c.label}</span>
     ${j.tag ? `<span style="margin-left:6px;background:rgba(192,25,26,.1);color:var(--accent);font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;">★ ${j.tag}</span>` : ''}`;
  document.getElementById('modal-price').innerHTML =
    `¥${j.price.toLocaleString()}<span>/日</span>`;
  document.getElementById('modal-grid').innerHTML = `
    <div class="modal-item"><label>日程</label><div class="val">${j.dates}</div></div>
    <div class="modal-item"><label>ポジション</label><div class="val">${j.position} ${j.count}名</div></div>
    <div class="modal-item"><label>交通費</label><div class="val">${j.transport}</div></div>
    <div class="modal-item"><label>宿泊費</label><div class="val">${j.lodging || 'なし'}</div></div>
    ${j.note ? `<div class="modal-item" style="grid-column:span 2;"><label>備考</label><div class="val">${j.note}</div></div>` : ''}
  `;

  const msg = encodeURIComponent(
    `【案件応募】\n${j.store}（${j.station}）\n${j.dates}\n${j.position}\n¥${j.price.toLocaleString()}/日・${j.transport}${j.lodging ? ' / ' + j.lodging : ''}\n\n上記案件に応募します。`
  );
  document.getElementById('modal-line-btn').href =
    `https://line.me/R/oaMessage/%40597ckygq/?${msg}`;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

renderJobs();
</script>
</body>
</html>
